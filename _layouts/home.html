<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC",
                   "Microsoft YaHei", "Source Han Sans SC", "Helvetica Neue", sans-serif;
    }
    .content-body blockquote {
      border-left: 4px solid #a5b4fc;
      padding: 0.85rem 1.1rem;
      margin: 1rem 0;
      background: #f5f3ff;
      border-radius: 0 0.6rem 0.6rem 0;
      color: #374151;
      line-height: 1.75;
    }
    .content-body blockquote.important,
    .content-body blockquote.important-title { border-left-color: #7c3aed; background: #ede9fe; }
    .content-body blockquote.note,
    .content-body blockquote.note-title { border-left-color: #2563eb; background: #eff6ff; }
    .content-body blockquote p { margin-bottom: 0.4rem; }
    .content-body blockquote p:last-child { margin-bottom: 0; }
    .content-body blockquote ul { list-style-type: disc; padding-left: 1.25rem; margin-top: 0.5rem; }
    .content-body blockquote li { margin-bottom: 0.25rem; }
    .content-body a { color: #4f46e5; text-decoration: none; }
    .card-btn {
      display: block;
      background: #fff;
      border: 1px solid #e0e7ff;
      border-radius: 12px;
      padding: 14px 12px;
      text-decoration: none !important;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      position: relative;
      color: inherit;
    }
    .card-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(79,70,229,0.12);
      border-color: #818cf8;
    }
    .btn-primary {
      background: #4f46e5;
      color: #fff;
      padding: 10px 24px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      display: inline-block;
    }
    .btn-primary:hover {
      background: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(79,70,229,0.35);
    }
    .btn-outline {
      border: 2px solid #c7d2fe;
      color: #4f46e5;
      padding: 10px 24px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      background: #fff;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      display: inline-block;
    }
    .btn-outline:hover {
      background: #eef2ff;
      border-color: #818cf8;
      transform: translateY(-1px);
    }
    .btn-text {
      font-size: 0.85rem;
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s, gap 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-text:hover { color: #3730a3; gap: 7px; }
    .content-body a:hover { color: #3730a3; }
    .content-body strong { font-weight: 700; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-800">

  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-3xl mx-auto px-4">
      <div class="flex justify-between items-center h-14">
        <a href="{{ '/' | relative_url }}" class="text-lg font-bold text-indigo-700 tracking-wide hover:text-indigo-500 transition-colors">
          🌟 启发说
        </a>
        <div class="hidden md:flex items-center gap-5 text-sm font-medium text-gray-600">
          <a href="{{ '/' | relative_url }}" class="text-indigo-600 font-semibold">首页</a>
          <a href="{{ '/upcoming/' | relative_url }}" class="hover:text-indigo-600 transition-colors">即将开始</a>
          <a href="{{ '/past/' | relative_url }}" class="hover:text-indigo-600 transition-colors">往期活动</a>
          <a href="{{ '/about/' | relative_url }}" class="hover:text-indigo-600 transition-colors">关于我们</a>
          <div class="relative group">
            <button class="hover:text-indigo-600 transition-colors flex items-center gap-1">工具 <svg class="w-3 h-3 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg></button>
            <div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-36 bg-white border border-gray-200 rounded-xl shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-150 z-50 py-1">
              <a href="{{ '/timer/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-t-xl">⏱️ 计时器</a>
              <a href="{{ '/handsup/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-b-xl">✋ 举手队列</a>
            </div>
          </div>
          <a href="{{ '/join/' | relative_url }}" class="bg-indigo-600 text-white px-3 py-1 rounded-full text-sm font-semibold hover:bg-indigo-700 transition-colors">🤝 如何加入</a>
        </div>
        <button id="menu-btn" class="md:hidden p-1 rounded text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-300" aria-label="菜单">
          <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="mobile-nav" class="hidden pb-4 md:hidden border-t border-gray-100 pt-2 space-y-1">
        <a href="{{ '/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-indigo-50 text-indigo-700 font-semibold">🏠 首页</a>
        <a href="{{ '/upcoming/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">🙌 即将开始</a>
        <a href="{{ '/past/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">📅 往期活动</a>
        <a href="{{ '/about/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">💡 关于我们</a>
        <a href="{{ '/timer/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">⏱️ 计时器</a>
        <a href="{{ '/handsup/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">✋ 举手队列</a>
        <a href="{{ '/join/' | relative_url }}" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition-colors">🤝 如何加入</a>
      </div>
    </div>
  </nav>

  <!-- Hero Banner -->
  <div style="background:linear-gradient(135deg,#eef2ff 0%,#f5f3ff 50%,#faf5ff 100%);border-bottom:1px solid #e0e7ff;">
    <div class="max-w-3xl mx-auto px-4 text-center" style="padding: 1.5rem 1rem 2rem;">
      <h1 class="font-bold tracking-tight text-indigo-800" style="font-size: clamp(1.6rem, 6vw, 3rem); margin-bottom: 0.4rem;">西雅图 · 启发说</h1>
      <p class="text-indigo-500 font-medium" style="font-size: clamp(0.85rem, 3vw, 1.1rem); margin-bottom: 0.25rem;">Qifa Talk — Seattle</p>
      <p class="text-gray-500 italic" style="font-size: clamp(0.8rem, 2.5vw, 1rem); margin-bottom: 1.5rem;">启发思维，共话未来</p>
      <div class="flex flex-wrap justify-center gap-3">
        <a href="{{ '/upcoming/' | relative_url }}" class="btn-primary">🙌 即将开始的活动</a>
        <a href="{{ '/about/' | relative_url }}" class="btn-outline">了解我们 →</a>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
    <div class="content-body">
      {{ content }}
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 py-8 mt-4">
    <div class="max-w-3xl mx-auto px-4 text-center">
      <p class="text-indigo-700 font-semibold text-lg mb-1">🌟 西雅图 · 启发说</p>
      <p class="text-sm text-gray-400">启发思维，共话未来 · 非营利性华人社群</p>
    </div>
  </footer>

  <script>
    const btn = document.getElementById('menu-btn');
    const nav = document.getElementById('mobile-nav');
    const iconOpen = document.getElementById('icon-open');
    const iconClose = document.getElementById('icon-close');
    btn.addEventListener('click', () => {
      nav.classList.toggle('hidden');
      iconOpen.classList.toggle('hidden');
      iconClose.classList.toggle('hidden');
    });
  </script>

</body>
</html>
